<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CLAUDETTE</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon.png" type="image/png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.17.0/xlsx.full.min.js"></script>
    <!-- Inclure Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <h1 class="sticky-notch">🦐 CLAUDETTE 🦐</h1>
    <div style="position: absolute; top: 25px; right: 10px;">
        <button id="help-button">Aide</button>
    </div>
    <div>
        <!-- Nouveau label stylisé pour l'input -->
        <label for="folder-input" class="folder-upload-label">📁 Charger les données</label>
        <input type="file" id="folder-input" webkitdirectory multiple class="folder-upload-input">
        <label>➡️ Y:\Treso\Claudette ➡️ Datas ✅ </label>
        
        <label for="year-select">Année :</label>
        <select id="year-select">
            <option value="">--Choisir une année--</option>
        </select>

        <label for="month-select">Mois :</label>
        <select id="month-select">
            <option value="">--Choisir un mois--</option>
        </select>

        <label for="entity-select">Entité :</label>
        <select id="entity-select">
            <option value="">--Choisir une entité--</option>
        </select>
    </div>
    <div>

    </div>
    <div class="container">
        <!-- Tableau Net Debt Perf -->
        <div class="table-container">
            <table id="data-table">
                <thead>
                    <tr>
                    </tr>
                </thead>
                <tbody>
                    <!-- Les données seront affichées ici -->
                </tbody>
            </table>
        </div>

        <div class="right-column">
            <!-- Graphique Cash -->
            <div class="chart-container">
                <canvas id="cashChart"></canvas>
            </div>
            <!-- Tableau Bilan -->
            <div class="data-table">
                <canvas id="bs-table"></canvas>
            </div>
        </div>
    </div>
    <div id="help-modal">
        <button id="close-help" >X</button>
        <iframe src="https://scribehow.com/embed/CLAUDETTE___5DFyfio5S56W8E4OC6bCDQ?removeLogo=true" width="100%" height="100%" allowfullscreen frameborder="0"></iframe>
    </div>
    <div id="modal-overlay" ></div>
    <script src="app.js"></script>
    <script>
        document.getElementById('help-button').addEventListener('click', () => {
            document.getElementById('help-modal').style.display = 'block';
            document.getElementById('modal-overlay').style.display = 'block';
        });

        document.getElementById('close-help').addEventListener('click', () => {
            document.getElementById('help-modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        });

        document.getElementById('modal-overlay').addEventListener('click', () => {
            document.getElementById('help-modal').style.display = 'none';
            document.getElementById('modal-overlay').style.display = 'none';
        });
    </script>
    <footer style="text-align:center; margin-top:30px;">
        <small><i>Claudette v1.9 - Developped by Jean Torrens</i></small>
    </footer>
</body>
</html>
